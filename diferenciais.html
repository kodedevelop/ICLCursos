<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Por que estudar no ICL?</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/diferenciais.css">
</head>
<body>

  <section class="why-section" aria-labelledby="why-title">

    <!-- Título -->
    <div class="why-heading">
      <span class="why-heading-line" aria-hidden="true"></span>
      <h2 class="why-heading-text" id="why-title">
        Por que estudar no <span>ICL</span>?
      </h2>
      <span class="why-heading-line" aria-hidden="true"></span>
    </div>

    <!-- Cards -->
    <div class="why-grid">

      <div class="why-card">
        <div class="why-card-img-wrap">
          <img src="assets/img/livros.webp" alt="Pilha de livros coloridos" />
        </div>
        <p class="why-card-label">Cuidado e compromisso com os nossos alunos</p>
      </div>

      <div class="why-card">
        <div class="why-card-img-wrap">
          <img src="assets/img/livros2.webp" alt="Estantes com muitos livros" />
        </div>
        <p class="why-card-label">Professores com experiência em Provas de Concursos</p>
      </div>

      <div class="why-card">
        <div class="why-card-img-wrap">
          <img src="assets/img/professora.webp" alt="Professora em frente ao quadro" />
        </div>
        <p class="why-card-label">Materiais ricos em questões e direto ao ponto</p>
      </div>

    </div>

  </section>

</body>
</html>
