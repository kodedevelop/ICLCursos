<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato</title>

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/sectionContato.css">

  <!-- JS -->
  <script src="assets/js/main.js" defer></script>
</head>

<body>
  <section class="section-contato">
    <h2>CONTATO</h2>

    <div class="container-contato">
      <div class="form-container">
        <form class="form-contato" action="">
          <div class="form-group">
            <label for="nome">Nome</label>
            <input type="text" name="nome" id="nome">
          </div>
          <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="tel" name="telefone" id="telefone">
          </div>
          <div class="form-group">
            <label for="mensagem">Mensagem</label>
            <textarea name="mensagem" id="mensagem"></textarea>
          </div>
          <button type="submit">Enviar Mensagem</button>
        </form>
      </div>
      <div class="infos-contato">
        <div class="info-endereco infos-contato-all">
          <h3>Endereço</h3>
          <p>Av. Cipriano Del Fávero, 890 - Centro, Uberlândia - MG</p>
          <p>CEP: 38400-106</p>
          <button>VER NO MAPA
            <img src="assets/img/seta-direita.svg" alt="">
          </button>
        </div>
        <div class="info-email infos-contato-all">
          <h3>E-mail</h3>
          <p>comercial@iclcursos.com.br</p>
        </div>
        <div class="info-contato infos-contato-all">
          <h3>Contato</h3>
          <p>(34) 3237-2012 | (34) 98420-9303</p>
        </div>
        <div class="info-horario infos-contato-all">
          <h3>Horário de funcionamento</h3>
          <p>De Segunda a Sexta - 08:00 às 22:00</p>
          <p>Aos Sábados - 08:00 às 13:00</p>
        </div>
        <div class="info-redes-sociais">
          <img src="assets/img/Icon-instagram.svg" alt="">
          <img src="assets/img/icno-facebook.svg" alt="">
          <img src="assets/img/icon-youtube.svg" alt="">
        </div>
      </div>
    </div>
  </section>
</body>

</html>
